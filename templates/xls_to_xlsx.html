<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLS → XLSX 转换 - 办公效率工具集</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <a href="/" class="back-link">← 返回工具集</a>
    <h1>📊 XLS 转 XLSX</h1>
    <p class="page-desc">将 Excel 97-2003 (.xls) 文件转换为 Excel 2007+ (.xlsx) 格式。<br>
    转换基于 LibreOffice 引擎，<strong>完整保留内容、格式、图片、图表</strong>等所有元素。</p>

    <div class="upload-zone" id="dropZone">
        <div class="upload-icon">📂</div>
        <p class="upload-text">拖放 .xls 文件到此处</p>
        <p class="upload-hint">或点击选择文件</p>
        <input type="file" id="fileInput" accept=".xls" hidden>
    </div>

    <div id="fileInfo" class="file-info hidden">
        <span id="fileName"></span>
        <span id="fileSize"></span>
        <button id="removeBtn" class="btn-remove">✕</button>
    </div>

    <button id="convertBtn" class="btn btn-primary hidden">开始转换</button>

    <div id="progress" class="progress hidden">
        <div class="progress-bar" id="progressBar"></div>
        <p id="statusText">转换中，请稍候...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="result" class="result hidden">
        <p>✅ 转换完成！</p>
        <a id="downloadLink" class="btn btn-success" download>下载 XLSX</a>
    </div>

    <div class="note">
        <h3>📋 说明</h3>
        <ul>
            <li>支持最大 500MB 的文件</li>
            <li>文件仅用于转换，不会被永久存储（30分钟后自动清理）</li>
            <li>建议先用小文件测试，确认效果满意后再处理大文件</li>
        </ul>
    </div>
</div>

<script>
(() => {
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeBtn');
    const convertBtn = document.getElementById('convertBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const errorDiv = document.getElementById('error');
    const resultDiv = document.getElementById('result');
    const downloadLink = document.getElementById('downloadLink');

    let selectedFile = null;
    let isConverting = false;

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function resetUI() {
        hide(errorDiv);
        hide(resultDiv);
        hide(progress);
        convertBtn.disabled = false;
        convertBtn.textContent = '开始转换';
        isConverting = false;
    }

    function show(el) { el.classList.remove('hidden'); }
    function hide(el) { el.classList.add('hidden'); }

    function handleFile(file) {
        if (!file) return;
        if (!file.name.toLowerCase().endsWith('.xls')) {
            showError('仅支持 .xls 格式文件');
            return;
        }
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        show(fileInfo);
        dropZone.classList.add('has-file');
        show(convertBtn);
        resetUI();
    }

    function showError(msg) {
        errorDiv.textContent = msg;
        show(errorDiv);
        hide(resultDiv);
        hide(progress);
        convertBtn.disabled = false;
        convertBtn.textContent = '开始转换';
        isConverting = false;
    }

    // ── Drag & Drop ──
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            handleFile(e.dataTransfer.files[0]);
        }
    });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

    // ── Remove file ──
    removeBtn.addEventListener('click', () => {
        selectedFile = null;
        fileInput.value = '';
        hide(fileInfo);
        hide(convertBtn);
        dropZone.classList.remove('has-file');
        resetUI();
    });

    // ── Convert ──
    convertBtn.addEventListener('click', async () => {
        if (!selectedFile || isConverting) return;
        isConverting = true;
        convertBtn.disabled = true;
        convertBtn.textContent = '转换中...';
        hide(errorDiv);
        hide(resultDiv);
        progressBar.style.width = '0%';
        show(progress);
        statusText.textContent = '上传文件中...';
        progressBar.style.width = '10%';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const resp = await fetch('/api/convert/xls-to-xlsx', {
                method: 'POST',
                body: formData,
            });
            progressBar.style.width = '80%';
            statusText.textContent = '处理中...';

            if (!resp.ok) {
                const data = await resp.json().catch(() => ({}));
                throw new Error(data.error || `服务器错误 (${resp.status})`);
            }

            progressBar.style.width = '95%';
            statusText.textContent = '准备下载...';

            // 获取 blob 并触发下载
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const originalName = selectedFile.name.replace(/\.xls$/i, '.xlsx');

            progressBar.style.width = '100%';
            statusText.textContent = '完成 ✅';

            downloadLink.href = url;
            downloadLink.download = originalName;
            hide(progress);
            show(resultDiv);

        } catch (err) {
            showError(err.message);
        } finally {
            isConverting = false;
            convertBtn.disabled = false;
            convertBtn.textContent = '开始转换';
        }
    });
})();
</script>
</body>
</html>
